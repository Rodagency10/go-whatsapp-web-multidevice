services:
  whatsapp:
    image: ghcr.io/rodagency10/go-whatsapp-web-multidevice:dev
    restart: always
    pull_policy: always
    ports:
      - "${WA_PORT:-3080}:3080"
    volumes:
      - whatsapp:/app/storages
    command:
      - rest
      - --basic-auth=${WA_USER}:${WA_PASSWORD}
      - --port=${WA_PORT:-3080}
      - --debug=false
      - --os=Chrome
      - --account-validation=false
    environment:
      - WA_USER=${WA_USER:-admin}
      - WA_PASSWORD=${WA_PASSWORD:-changeme}
      - CHATWOOT_HUMAN_DELIVERY_ENABLED=true
      - CHATWOOT_HUMAN_TYPING_MIN_MS=2000
      - CHATWOOT_HUMAN_TYPING_MEDIA_MS=2000
      - CHATWOOT_HUMAN_PRESENCE_SETTLE_MS=800


volumes:
  whatsapp:
